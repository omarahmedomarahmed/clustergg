<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cluster — Cover</title>
<link rel="stylesheet" href="../assets/theme.css" />
<style>
  body { background:
    radial-gradient(60% 45% at 15% 0%, rgba(124,58,237,.22), transparent 60%),
    radial-gradient(45% 40% at 85% 10%, rgba(8,145,178,.18), transparent 60%),
    radial-gradient(55% 55% at 50% 110%, rgba(232,121,249,.14), transparent 60%),
    #04051a;
  }
</style>
</head>
<body>
<div class="slide-container" data-screen-label="01 Cover">

  <!-- Ambient orbit rings (decorative) -->
  <div data-object="true" data-object-type="shape"
       style="position:absolute; left:1120px; top:60px; width:900px; height:900px; border-radius:9999px; border:1px dashed rgba(139,92,246,0.28); z-index:1;"></div>
  <div data-object="true" data-object-type="shape"
       style="position:absolute; left:1240px; top:180px; width:660px; height:660px; border-radius:9999px; border:1px dashed rgba(34,211,238,0.22); z-index:1;"></div>
  <div data-object="true" data-object-type="shape"
       style="position:absolute; left:1360px; top:300px; width:420px; height:420px; border-radius:9999px; border:1px dashed rgba(232,121,249,0.20); z-index:1;"></div>

  <!-- Star specks -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:260px; top:180px; width:3px; height:3px; border-radius:50%; background:#e879f9; box-shadow:0 0 10px 2px rgba(232,121,249,0.7); z-index:2;"></div>
  <div data-object="true" data-object-type="shape" style="position:absolute; left:520px; top:820px; width:4px; height:4px; border-radius:50%; background:#22d3ee; box-shadow:0 0 12px 2px rgba(34,211,238,0.7); z-index:2;"></div>
  <div data-object="true" data-object-type="shape" style="position:absolute; left:1780px; top:900px; width:3px; height:3px; border-radius:50%; background:#a78bfa; box-shadow:0 0 10px 2px rgba(167,139,250,0.7); z-index:2;"></div>
  <div data-object="true" data-object-type="shape" style="position:absolute; left:1620px; top:120px; width:3px; height:3px; border-radius:50%; background:#fbbf24; box-shadow:0 0 12px 2px rgba(251,191,36,0.7); z-index:2;"></div>

  <!-- Top bar: brand mark + wordmark -->
  <div data-object="true" data-object-type="image"
       style="position:absolute; left:120px; top:100px; width:56px; height:56px; z-index:6;">
    <img src="../assets/logo-c.png" alt="Cluster C mark" style="width:56px; height:56px; display:block; filter:drop-shadow(0 0 16px rgba(139,92,246,0.6));" />
  </div>
  <div data-object="true" data-object-type="textbox"
       style="position:absolute; left:190px; top:110px; width:220px; height:40px; z-index:10; display:flex; align-items:center;">
    <span style="font-family:var(--font-mono); font-size:16px; letter-spacing:0.32em; color:#22d3ee; text-transform:uppercase;">CLUSTER · GG</span>
  </div>

  <!-- Round chip: PRE-SEED -->
  <div data-object="true" data-object-type="shape"
       style="position:absolute; left:120px; top:288px; width:220px; height:40px; border-radius:9999px; border:1px solid rgba(139,92,246,0.4); background:rgba(139,92,246,0.10); z-index:9;"></div>
  <div data-object="true" data-object-type="textbox"
       style="position:absolute; left:120px; top:288px; width:220px; height:40px; z-index:10; display:flex; align-items:center; justify-content:center; gap:10px;">
    <span style="width:8px; height:8px; border-radius:50%; background:#22d3ee; box-shadow:0 0 10px 2px rgba(34,211,238,0.7);"></span>
    <span style="font-family:var(--font-mono); font-size:13px; letter-spacing:0.28em; color:#e8eaf6;">PRE-SEED · 2026</span>
  </div>

  <!-- Headline -->
  <div data-object="true" data-object-type="textbox"
       style="position:absolute; left:120px; top:370px; width:1100px; height:340px; z-index:10;">
    <div style="font-size:150px; font-weight:700; line-height:0.98; letter-spacing:-0.03em; color:#e8eaf6;">
      Every game.<br/>
      <span class="grad-text">One&nbsp;identity.</span>
    </div>
  </div>

  <!-- Subhead -->
  <div data-object="true" data-object-type="textbox"
       style="position:absolute; left:120px; top:740px; width:1000px; height:120px; z-index:10;">
    <div style="font-size:28px; line-height:1.45; color:#9aa0c3; font-weight:400;">
      Cluster is the cross-game <span style="color:#e8eaf6;">gamer passport</span> — one profile that unifies stats, community, challenges, and gamified quests across every game a player touches.
    </div>
  </div>

  <!-- CTAs -->
  <div data-object="true" data-object-type="shape"
       style="position:absolute; left:120px; top:900px; width:280px; height:56px; border-radius:9999px;
              background:linear-gradient(92deg,#7c3aed,#0891b2);
              box-shadow:0 0 32px -4px rgba(139,92,246,0.7), inset 0 1px 0 rgba(255,255,255,0.2);
              z-index:9;"></div>
  <div data-object="true" data-object-type="textbox"
       style="position:absolute; left:120px; top:900px; width:280px; height:56px; z-index:10; display:flex; align-items:center; justify-content:center;">
    <span style="color:#fff; font-weight:600; font-size:18px; letter-spacing:0.02em;">clustergg.com</span>
  </div>

  <div data-object="true" data-object-type="shape"
       style="position:absolute; left:420px; top:900px; width:320px; height:56px; border-radius:9999px;
              border:1px solid rgba(139,92,246,0.5); background:rgba(139,92,246,0.08); z-index:9;"></div>
  <div data-object="true" data-object-type="textbox"
       style="position:absolute; left:420px; top:900px; width:320px; height:56px; z-index:10; display:flex; align-items:center; justify-content:center;">
    <span style="color:#e8eaf6; font-weight:500; font-size:18px;">Pre-seed round · $30k for 20%</span>
  </div>

  <!-- Big planet artwork right side (the "C" as a planet with orbit ring) -->
  <div data-object="true" data-object-type="image"
       style="position:absolute; left:1250px; top:230px; width:560px; height:560px; z-index:5;">
    <img src="../assets/logo-c.png" alt="Cluster planet mark"
         style="width:560px; height:560px; display:block; filter:drop-shadow(0 0 80px rgba(139,92,246,0.75)) drop-shadow(0 0 140px rgba(34,211,238,0.35));" />
  </div>

  <!-- Bottom row: page num + domain -->
  <div data-object="true" data-object-type="textbox"
       style="position:absolute; left:120px; top:1000px; width:200px; height:24px; z-index:10;">
    <span class="page-num">01 / 12</span>
  </div>
  <div data-object="true" data-object-type="textbox"
       style="position:absolute; left:1600px; top:1000px; width:200px; height:24px; z-index:10; text-align:right;">
    <span class="page-num">CLUSTERGG.COM</span>
  </div>

</div>
